name: E2E Tests

# Triggers:
#   - PR to main: catch regressions before they ship
#   - Push to main: confirm prod is healthy after every deploy
#   - Weekly Mondays 09:00 UTC: catch drift even when no commits land
#   - Manual dispatch: run on demand from the Actions tab
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: '0 9 * * 1'   # Mondays 9am UTC
  workflow_dispatch:
    inputs:
      cross_browser:
        description: 'Run cross-browser matrix (Firefox + WebKit too)?'
        type: boolean
        default: false

# Cancel any in-flight runs for the same branch when a new push lands.
concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Playwright (chromium)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      CI: 'true'
      # CI ALWAYS spins up Next.js locally and tests against it. We
      # deliberately ignore the PLAYWRIGHT_BASE_URL secret here — that
      # secret existed to point at a Vercel preview, but the local-server
      # path is more reliable (no preview-deployment race conditions, no
      # production DB risk). If we ever want to test against a deployed
      # URL again, switch this back to ${{ secrets.PLAYWRIGHT_BASE_URL }}.
      PLAYWRIGHT_BASE_URL: 'http://localhost:3000'

      # Supabase test branch (project ref pukcxxgafgrieetkgogy)
      NEXT_PUBLIC_SUPABASE_URL:     ${{ secrets.TEST_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.TEST_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY:    ${{ secrets.TEST_SUPABASE_SERVICE_ROLE_KEY }}

      # Stripe test mode
      STRIPE_SECRET_KEY:     ${{ secrets.STRIPE_TEST_SECRET_KEY }}
      STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_TEST_WEBHOOK_SECRET }}

      # Site URL — affects redirect URLs in server actions and emails.
      # Hardcoded to localhost; CI always tests against the local server.
      NEXT_PUBLIC_SITE_URL: 'http://localhost:3000'
      NEXT_PUBLIC_APP_URL:  'http://localhost:3000'

      # Listing trial date — keep it in the future so paywall logic stays
      # off in CI unless we explicitly want to test the paid path.
      LISTING_TRIAL_ENDS: '2099-12-31'

      # Admin allowlist — must include the seeded e2e admin so admin specs
      # (comp-sponsor, broker approval, etc.) can read/write. Add other
      # admin-style emails here if specs cover them.
      ADMIN_EMAILS: 'e2e+admin@hangarmarketplace.com'

      # CRON_SECRET — needed by the cron endpoints. Tests don't actually
      # hit cron URLs, but setting a value avoids env-var-missing errors
      # during dev server startup.
      CRON_SECRET: 'test-cron-secret-not-real'

      # Turnstile test bypass
      NEXT_PUBLIC_TURNSTILE_SITE_KEY: '1x00000000000000000000AA'
      TURNSTILE_SECRET_KEY:           '1x0000000000000000000000000000000AA'

      # Test users
      TEST_ADMIN_EMAIL:    ${{ secrets.TEST_ADMIN_EMAIL }}
      TEST_ADMIN_PASSWORD: ${{ secrets.TEST_ADMIN_PASSWORD }}
      TEST_BROKER_EMAIL:   ${{ secrets.TEST_BROKER_EMAIL }}
      TEST_BROKER_PASSWORD: ${{ secrets.TEST_BROKER_PASSWORD }}
      TEST_USER_EMAIL:     ${{ secrets.TEST_USER_EMAIL }}
      TEST_USER_PASSWORD:  ${{ secrets.TEST_USER_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          # Node 20 was deprecated for Actions in 2026 — pin to 22 LTS to
          # match Vercel's runtime and silence the deprecation warning.
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Get Playwright version
        id: pw_version
        run: echo "version=$(node -e 'console.log(require(\"@playwright/test/package.json\").version)')" >> $GITHUB_OUTPUT

      - name: Cache Playwright browsers
        id: pw_cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw_version.outputs.version }}

      - name: Install Playwright browsers
        if: steps.pw_cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps (cache hit)
        if: steps.pw_cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run Playwright tests
        # Full suite: Playwright spins up a Next.js dev server (configured
        # via webServer in playwright.config.ts) wired to the test Supabase
        # branch via the env block above. Auth setup runs first and saves
        # storage state for the seeded test users; specs that need auth
        # use that state via test.use({ storageState }).
        #
        # Stripe tests are tagged @stripe / @stripe-api / @stripe-webhook
        # and gracefully skip if their respective keys aren't configured —
        # so this command is safe even when STRIPE_TEST_* secrets are unset.
        run: npx playwright test --project=chromium

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}
          path: playwright-report/
          retention-days: 14

      - name: Upload trace files (failed tests)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces-${{ github.run_id }}
          # if-no-files-found: warn (default) was creating noise on early
          # setup failures where the dir is empty. Switch to ignore — the
          # full HTML report is still uploaded above and contains traces.
          if-no-files-found: ignore
          path: tests/e2e/.test-results/
          retention-days: 14

  notify:
    name: Notify on failure
    needs: e2e
    # Email only on the weekly scheduled run. Every push iteration spams
    # the inbox during active development; the schedule run is the one
    # that actually represents "is main healthy without anyone touching it".
    if: failure() && github.event_name == 'schedule'
    runs-on: ubuntu-latest
    env:
      # Secrets can't be referenced in `if:` conditions, but they can be
      # surfaced via env and read inside `run:`. We gate the curl call on
      # the env var existing rather than on the secret directly.
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
    steps:
      - name: Send failure email via Resend
        run: |
          if [ -z "$RESEND_API_KEY" ]; then
            echo "RESEND_API_KEY secret is not configured — skipping notification."
            echo "Add it under Repo Settings → Secrets and variables → Actions to enable email alerts on CI failures."
            exit 0
          fi
          curl -sS -X POST https://api.resend.com/emails \
            -H "Authorization: Bearer $RESEND_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{
              \"from\": \"Hangar Marketplace CI <hello@hangarmarketplace.com>\",
              \"to\": [\"andre.dosogne@outlook.com\"],
              \"subject\": \"[CI] E2E tests failed on ${{ github.ref_name }}\",
              \"html\": \"<p>The Playwright suite failed on commit <code>${{ github.sha }}</code>.</p><p><a href=\\\"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\\\">View run</a></p>\"
            }"
